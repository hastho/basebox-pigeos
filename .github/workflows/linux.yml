name: Linux builds

on:
  push:
    paths-ignore:
      - '.clang-format'
      - '.mdl-styles'
      - '*.md'
      - 'docs/**'
      - 'licenses/**'
      - 'website/**'
    tags:
      - 'v*'
  pull_request:
    paths-ignore:
      - '.clang-format'
      - '.mdl-styles'
      - '*.md'
      - 'docs/**'
      - 'licenses/**'
      - 'website/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache_subprojects:
    name: Cache subprojects
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Meson
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-setuptools meson ninja-build

      - name: Cache subprojects
        id: cache-subprojects
        uses: actions/cache@v4
        with:
          path: subprojects.tar
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}-1

      - if: steps.cache-subprojects.outputs.cache-hit != 'true'
        name: Generate subprojects cache
        run: |
          chmod +x scripts/fetch-and-tar-subprojects.sh
          ./scripts/fetch-and-tar-subprojects.sh

  build:
    name: ${{ matrix.conf.name }}
    runs-on: ubuntu-latest
    container: ${{ matrix.conf.container }}
    needs: cache_subprojects
    strategy:
      fail-fast: false
      matrix:
        conf:
          - name: Ubuntu Latest
            container: null
            update_cmd: sudo apt-get update
            install_cmd: sudo apt-get install -y build-essential libsdl2-dev libpng-dev libopusfile-dev libspeexdsp-dev
            build_flags: -Dbuildtype=debug -Dautovec_info=false
            needs_pip: true

          - name: Ubuntu Release
            container: null
            update_cmd: sudo apt-get update
            install_cmd: sudo apt-get install -y build-essential libsdl2-dev libpng-dev libopusfile-dev libspeexdsp-dev
            build_flags: -Dbuildtype=release -Dautovec_info=false
            needs_pip: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          ${{ matrix.conf.update_cmd }}
          ${{ matrix.conf.install_cmd }}
          ${{ matrix.conf.needs_pip && 'sudo apt-get install -y meson ninja-build' || '' }}

      - name: Restore subprojects cache
        uses: actions/cache@v4
        with:
          path: subprojects.tar
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}-1

      - name: Extract or Fetch subprojects
        run: |
          # WICHTIG: Fix für Debian Docker Git-Security
          git config --global --add safe.directory "$PWD" || true
          if [ -f subprojects.tar ]; then
            tar -xf subprojects.tar
          else
            chmod +x scripts/fetch-and-tar-subprojects.sh
            ./scripts/fetch-and-tar-subprojects.sh
            tar -xf subprojects.tar
          fi

      - name: Meson setup
        run: meson setup build --wrap-mode=forcefallback ${{ matrix.conf.build_flags }} || (cat build/meson-logs/meson-log.txt && exit 1)

      - name: Build
        run: meson compile -C build

  build_release:
    name: Linux Release
    runs-on: ubuntu-latest
    needs: cache_subprojects
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip meson ninja-build tree $(cat packages/ubuntu-24.04-apt.txt)

      - name: Restore subprojects cache
        uses: actions/cache@v4
        with:
          path: subprojects.tar
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}-1

      - name: Extract subprojects
        run: tar -xf subprojects.tar || ./scripts/fetch-and-tar-subprojects.sh

      - name: Setup release build
        run: |
          meson setup build \
            -Ddefault_library=static \
            --wrap-mode=forcefallback \
            -Db_lto=true -Dbuildtype=release \
            || (cat build/meson-logs/meson-log.txt && exit 1)

      - name: Build & Package
        run: |
          meson compile -C build
          TAG=${GITHUB_REF#refs/tags/}
          PKG_DIR="basebox-linux-x86_64-$TAG"
          ./scripts/create-package.sh -p linux build "$PKG_DIR"
          tar -cJf "$PKG_DIR.tar.xz" "$PKG_DIR"
          echo "ASSET_PATH=$PKG_DIR.tar.xz" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}

