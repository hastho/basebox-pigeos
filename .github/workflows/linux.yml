name: Linux builds

on:
  push:
    paths-ignore:
      - '.clang-format'
      - '.mdl-styles'
      - '*.md'
      - 'docs/**'
      - 'licenses/**'
      - 'website/**'
    tags:
      - 'v*'

  pull_request:
    paths-ignore:
      - '.clang-format'
      - '.mdl-styles'
      - '*.md'
      - 'docs/**'
      - 'licenses/**'
      - 'website/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cache_subprojects:
    name: Cache subprojects
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Meson
        run:  |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y python3-setuptools
          sudo pip3 install --upgrade meson

      - name: Cache subprojects
        id:   cache-subprojects
        uses: actions/cache@v4
        with:
          path: subprojects.tar
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}-1
          enableCrossOsArchive: true

      - if:   steps.cache-subprojects.outputs.cache-hit != 'true'
        name: Generate subprojects cache
        run:  scripts/fetch-and-tar-subprojects.sh

  build:
    name: ${{ matrix.conf.name }}
    runs-on: ubuntu-latest
    container: ${{ matrix.conf.container }}
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    needs: cache_subprojects
    strategy:
      fail-fast: false
      matrix:
        conf:
          - name: Ubuntu Latest
            container: null
            update_cmd: sudo apt-get update
            install_cmd: sudo apt-get install -y build-essential meson ninja libsdl2-dev libpng-dev libopusfile-dev libspeexdsp-dev libasound2-dev libpulseAudio-dev libsamplerate0-dev libxkbcommon-dev libdecor-0-dev libgbm-dev libwayland-dev wayland-protocols libdrm-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev libxss-dev libopengl-dev libvulkan-dev libavcodec-dev libavformat-dev libswscale-dev libavutil-dev libswresample-dev libfluidsynth-dev libmt32emu-dev libslirp-dev
            build_flags: -Dbuildtype=debug
            run_tests: true

          - name: Debian Stable
            container: debian:stable-slim
            update_cmd: apt-get update
            install_cmd: apt-get install -y build-essential meson ninja libsdl2-dev libpng-dev libopusfile-dev libspeexdsp-dev libasound2-dev libpulseaudio-dev libsamplerate0-dev libxkbcommon0 libdecor-0 libgbm1 libwayland-1.0 wayland-protocols libdrm2 libx11-dev libxcursor-dev libxi-dev libxrandr-dev libxss-dev libopengl-dev libvulkan-dev libavcodec-dev libavformat-dev libswscale-dev libavutil-dev swresample-dev libfluidsynth-dev libmt32emu-dev libslirp4
            build_flags: -Dbuildtype=debug
            run_tests: true
            pip_cmd: pip3 install --break-system-packages

          - name: Fedora Latest
            container: fedora:latest
            update_cmd: dnf check-update || true
            install_cmd: dnf install -y gcc gcc-c++ meson ninja SDL2-devel libpng-devel libopusfile-devel speexdsp-devel alsa-lib-devel pulseaudio-libs-devel samplerate-devel libxkbcommon decor-devel gbm-devel wayland-protocols libdrm-devel libX11-devel libXCursor-devel libXi-devel libXrandr-devel libXss-devel libglvnd-devel vulkan-loader-devel ffmpeg-libs-devel fluidsynth-devel mt32emu-devel libslirp-devel python3-pip
            build_flags: -Dbuildtype=debug
            run_tests: true
            pip_cmd: pip3 install

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Dependencies
        run: |
          ${{ matrix.conf.update_cmd }}
          ${{ matrix.conf.install_cmd }}
          ${{ matrix.conf.pip_cmd || 'pip3 install' }} meson ninja

      - name: Restore subprojects cache
        id:   cache-subprojects
        uses: actions/cache@v4
        with:
          path: subprojects.tar
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}-1
          enableCrossOsArchive: true

      - name: Extract subprojects cache
        run:  scripts/extract-subprojects-tar.sh

      - name: Log environment
        run:  ./scripts/log-env.sh

      - name: Meson setup
        run:  meson setup ${{ matrix.conf.build_flags }} build \
          || ( cat build/meson-logs/meson-log.txt ; exit 1 )

      - name: Build
        run:  meson compile -C build |& tee build.log

      - name: Run tests
        if:   matrix.conf.run_tests
        run:  meson test --num-processes 128 -t 0 -C build --print-errorlogs

  build_release:
    name: Linux Release
    runs-on: ubuntu-latest
    needs: cache_subprojects
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - run:  sudo apt-get update

      - name: Install dependencies
        run: |
          sudo apt-get install -y tree \
            $(cat packages/ubuntu-24.04-apt.txt)
          sudo pip3 install --upgrade meson ninja

      - name: Restore subprojects cache
        id:   cache-subprojects
        uses: actions/cache@v4
        with:
          path: subprojects.tar
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}-1
          enableCrossOsArchive: true

      - name: Extract subprojects cache
        run:  scripts/extract-subprojects-tar.sh

      - name: Log environment
        run:  ./scripts/log-env.sh

      - name: Extract tag version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=$TAG" >> $GITHUB_ENV
          echo "PKG_DIR=basebox-linux-x86_64-$TAG" >> $GITHUB_ENV

      - name: Setup release build
        run: |
          meson setup \
            -Duse_xinput2=false \
            -Duse_zlib_ng=sse2,ssse3,neon \
            -Ddefault_library=static \
            --wrap-mode=forcefallback \
            -Db_lto=true -Db_lto_threads=$(nproc) \
            build \
          || ( cat build/meson-logs/meson-log.txt ; exit 1 )

      - name: Build
        run:  meson compile -C build

      - name: Package
        run: |
          ./scripts/create-package.sh \
            -p linux \
            build \
            "${{ env.PKG_DIR }}"

      - name: Create tarball
        run: |
          tar -cJf "${{ env.PKG_DIR }}.tar.xz" "${{ env.PKG_DIR }}"

      - name: Create GitHub Release
        uses: softprops/release-gh-release@v1
        with:
          files: |
            ${{ env.PKG_DIR }}.tar.xz
          prerelease: ${{ contains(github.ref, '-') }}