name: Linux builds

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_COMPRESS:      "true"
  CCACHE_COMPRESSLEVEL: "6"
  CCACHE_DIR:           "/dev/shm/.ccache"
  CCACHE_DIRECT:        "true"
  CCACHE_MAXSIZE:       "128M"
  CCACHE_SLOPPINESS:    "pch_defines,time_macros"
  CCACHE_UMASK:         "002"

  DEBEMAIL: ${{ github.actor }}@users.noreply.github.com
  DEBFULLNAME: ${{ github.actor }}

jobs:
  build_linux_release:
    name: x86_64 Debian Package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            $(cat packages/ubuntu-20.04-apt.txt)
          sudo pip3 install --upgrade meson==1.3.2 ninja

      - name: Prepare compiler cache
        id: prep-ccache
        shell: bash
        run: |
          mkdir -p "${CCACHE_DIR}"
          echo "dir=$CCACHE_DIR"                       >> $GITHUB_OUTPUT
          echo "today=$(date -I)"                      >> $GITHUB_OUTPUT
          echo "yesterday=$(date --date=yesterday -I)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        id: cache-ccache
        with:
          path: ${{ steps.prep-ccache.outputs.dir }}
          key: ccache-linux-release-${{ steps.prep-ccache.outputs.today }}-1
          restore-keys: |
            ccache-linux-release-${{ steps.prep-ccache.outputs.yesterday }}-1

      - name: Get version info
        id: version
        run: |
          git fetch --prune --unshallow --tags --force
          if git describe 2>/dev/null | grep -qs '-'; then
            DOSBOX_VERS=$(git describe | cut -d '-' -f 1 | sed 's/^v//')-dev
          elif git describe --always 2>/dev/null; then
            DOSBOX_VERS=$(git describe --always | sed 's/^v//')
          else
            DOSBOX_VERS="0.0.0-dev"
          fi
          echo "VERSION=${DOSBOX_VERS}" >> $GITHUB_OUTPUT

      - name: Build and install
        run: |
          meson setup \
            -Duse_xinput2=false \
            -Duse_zlib_ng=sse2,ssse3 \
            -Ddefault_library=static \
            --wrap-mode=forcefallback \
            -Db_lto=true \
            -Db_lto_threads=$(nproc) \
            --native-file=.github/meson/native-gcc.ini \
            build \
          || ( cat build/meson-logs/meson-log.txt ; exit 1 )
          ninja -C build
          meson install -C build --destdir=build/basebox-pigeos-amd64
          mkdir -p build/basebox-pigeos-amd64/DEBIAN
          cat > build/basebox-pigeos-amd64/DEBIAN/control << CONTROL
          Package: basebox-pigeos
          Version: ${{ steps.version.outputs.VERSION }}-1
          Section: games
          Priority: optional
          Architecture: amd64
          Maintainer: ${{ env.DEBFULLNAME }} <${{ env.DEBEMAIL }}>
          Description: DOSBox fork for PigeOS
           DOSBox Staging fork optimized for basebox-pigeos with
           LPT printer redirection support.
          CONTROL
          dpkg-deb --build build/basebox-pigeos-amd64 ./

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: basebox-pigeos-amd64-deb
          path: basebox-pigeos-amd64.deb
          overwrite: true


  build_linux_arm_release:
    name: ARM ${{ matrix.arch }} Debian Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [armhf, arm64]
    env:
      DEBEMAIL: ${{ github.actor }}@users.noreply.github.com
      DEBFULLNAME: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get version info
        id: version
        run: |
          git fetch --prune --unshallow --tags --force
          if git describe 2>/dev/null | grep -qs '-'; then
            DOSBOX_VERS=$(git describe | cut -d '-' -f 1 | sed 's/^v//')-dev
          elif git describe --always 2>/dev/null; then
            DOSBOX_VERS=$(git describe --always | sed 's/^v//')
          else
            DOSBOX_VERS="0.0.0-dev"
          fi
          echo "VERSION=${DOSBOX_VERS}" >> $GITHUB_OUTPUT
          echo "DOCKER_TAG=11-${DOSBOX_VERS}" >> $GITHUB_OUTPUT

      - name: Build and install
        run: |
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" -v "$PWD:$PWD" -w "$PWD" -e DEBEMAIL -e DEBFULLNAME ghcr.io/hastho/debian-cross:${{ steps.version.outputs.DOCKER_TAG }}-${{ matrix.arch }} bash -c 'set -x; mkdir -p /output; meson setup build --cross-file dosbox-cross --prefix=/usr -Duse_zlib_ng=false -Dunit_tests=disabled; ninja -C build; meson install -C build --destdir=build/basebox-pigeos-${{ matrix.arch }}; mkdir -p build/basebox-pigeos-${{ matrix.arch }}/DEBIAN; echo "Package: basebox-pigeos" > build/basebox-pigeos-${{ matrix.arch }}/DEBIAN/control; echo "Version: ${{ steps.version.outputs.VERSION }}-1" >> build/basebox-pigeos-${{ matrix.arch }}/DEBIAN/control; echo "Section: games" >> build/basebox-pigeos-${{ matrix.arch }}/DEBIAN/control; echo "Priority: optional" >> build/basebox-pigeos-${{ matrix.arch }}/DEBIAN/control; echo "Architecture: ${{ matrix.arch }}" >> build/basebox-pigeos-${{ matrix.arch }}/DEBIAN/control; echo "Maintainer: ${{ env.DEBFULLNAME }} <${{ env.DEBEMAIL }}>" >> build/basebox-pigeos-${{ matrix.arch }}/DEBIAN/control; echo "Description: DOSBox fork for PigeOS" >> build/basebox-pigeos-${{ matrix.arch }}/DEBIAN/control; echo " DOSBox Staging fork optimized for basebox-pigeos with LPT printer redirection support." >> build/basebox-pigeos-${{ matrix.arch }}/DEBIAN/control; dpkg-deb --build build/basebox-pigeos-${{ matrix.arch }} /output/; mv /output/basebox-pigeos_*_${{ matrix.arch }}.deb /output/basebox-pigeos-${{ matrix.arch }}.deb; ls -la /output/'

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: basebox-pigeos-${{ matrix.arch }}-deb
          path: output/basebox-pigeos-${{ matrix.arch }}.deb
          overwrite: true

  tag_build:
    name: Tag Build
    needs: [build_linux_release, build_linux_arm_release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag_name
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH_NAME" == "main" ]]; then
            TAG_NAME="CI-latest"
          else
            TAG_NAME="CI-latest-${BRANCH_NAME}"
          fi
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Tagging HEAD with: ${TAG_NAME}"

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f ${{ steps.tag_name.outputs.tag_name }}
          git push origin ${{ steps.tag_name.outputs.tag_name }} --force
