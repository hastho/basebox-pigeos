name: Raspberry Pi Build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - ".clang-format"
      - "*.md"
      - "docs/**"
      - "licenses/**"
  pull_request:
    paths-ignore:
      - ".clang-format"
      - "*.md"
      - "docs/**"
      - "licenses/**"
  workflow_dispatch:

jobs:
  build-pi:
    name: Build for Raspberry Pi (ARMv7/ARM64)
    runs-on: [self-hosted, linux, ARM]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat packages/raspberry-pi-apt.txt)

      - name: Setup build
        run: |
          meson setup build \
            --wrap-mode=forcefallback \
            -Dbuildtype=release \
            -Duse_fluidsynth=false \
            -Duse_mt32emu=false
          meson compile -C build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: basebox-pigeos-rpi
          path: build/dosbox
          overwrite: true
