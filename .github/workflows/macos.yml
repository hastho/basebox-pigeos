name: macOS builds

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_x86:
    name: macOS Intel (x86_64)
    runs-on: macos-15-intel  # Native Intel Runner
    steps:
      - uses: actions/checkout@v4
      - name: Install Deps
        run: brew install meson ninja sdl2 libpng opusfile speexdsp
      - name: Build
        run: |
          meson setup build -Dbuildtype=release -Dstrip=true
          meson compile -C build
      - name: Upload Intel Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-x86
          path: build/dosbox

  build_arm:
    name: macOS ARM (arm64)
    runs-on: macos-14  # Native Apple Silicon Runner
    steps:
      - uses: actions/checkout@v4
      - name: Install Deps
        run: brew install meson ninja sdl2 libpng opusfile speexdsp
      - name: Build
        run: |
          meson setup build -Dbuildtype=release -Dstrip=true
          meson compile -C build
      - name: Upload ARM Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-arm
          path: build/dosbox

  create_universal:
    name: Create Universal DMG
    needs: [build_x86, build_arm]
    runs-on: macos-14
    steps:
      - name: Download Intel
        uses: actions/download-artifact@v4
        with:
          name: binary-x86
          path: bin_x86
      - name: Download ARM
        uses: actions/download-artifact@v4
        with:
          name: binary-arm
          path: bin_arm
      - name: Create Bundle and DMG
        run: |
          BINARY="dosbox" # Adjust to your actual binary name
          APP="BaseBox.app"
          mkdir -p "$APP/Contents/MacOS"
          
          # Merge both native builds into one Universal Binary
          lipo -create bin_x86/$BINARY bin_arm/$BINARY -output "$APP/Contents/MacOS/$BINARY"
          
          # Verify architecture
          file "$APP/Contents/MacOS/$BINARY"
          
          # Build the DMG
          hdiutil create -volname "BaseBox" -srcfolder "$APP" -ov -format UDZO BaseBox_Universal.dmg
          
      - name: Upload Universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Universal-DMG
          path: "*.dmg"

