name: macOS builds
permissions:
  contents: write
  pull-requests: read
  actions: read

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths-ignore:
      - ".clang-format"
      - "*.md"
      - "docs/**"
      - "licenses/**"
  pull_request:
    paths-ignore:
      - ".clang-format"
      - "*.md"
      - "docs/**"
      - "licenses/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_macos:
    name: Build (${{ matrix.conf.arch }})
    runs-on: ${{ matrix.conf.host }}
    timeout-minutes: 90
    strategy:
      matrix:
        conf:
          - host: macos-15-intel
            arch: x86_64
            max_warnings: 0
          - host: macos-15
            arch: arm64
            max_warnings: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install dependencies
        run: |
          brew install python@3.14 || true
          brew link --overwrite python@3.14
          brew install meson ninja glib gettext sdl2 libpng opusfile speexdsp

      - name: Build with Meson
        run: |
          set -xo pipefail
          BUILD_DIR="build-${{ matrix.conf.arch }}"
          
          # Set rpath so dylibbundler can rewrite @rpath references
          # Use cpp_link_args to ensure Meson passes it to linker
          meson setup "$BUILD_DIR" \
            -Dbuildtype=release \
            -Dstrip=true \
            -Dcpp_link_args="-Wl,-rpath,@executable_path/../Frameworks"
          
          meson compile -C "$BUILD_DIR"

      - name: Upload per-arch binary
        uses: actions/upload-artifact@v7
        with:
          name: dosbox-${{ matrix.conf.arch }}
          path: build-${{ matrix.conf.arch }}/dosbox
          overwrite: true

  publish_universal:
    name: Publish Universal Build
    needs: build_macos
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Set version variables
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="nightly-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_HASH=${VERSION}-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Download per-arch binaries
        uses: actions/download-artifact@v8

      - name: Install brew dependencies
        run: |
          brew install dylibbundler
          brew install python@3.14 || true
          brew link --overwrite python@3.14
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install --overwrite librsvg

      - name: Create universal binary
        run: |
          lipo -create dosbox-x86_64/dosbox dosbox-arm64/dosbox \
            -output dosbox-universal
          chmod +x dosbox-universal
          lipo -info dosbox-universal

      - name: Build valid .app bundle
        run: |
          APP="BaseBox.app"
          BINARY="dosbox"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks" "$APP/Contents/Resources"
          cp dosbox-universal "$APP/Contents/MacOS/$BINARY"

          # Copy icon if available
          if [ -f "contrib/icons/macos/dosbox-staging.icns" ]; then
            cp "contrib/icons/macos/dosbox-staging.icns" "$APP/Contents/Resources/AppIcon.icns"
            ICON_LINE="  <key>CFBundleIconFile</key>\n  <string>AppIcon</string>"
          else
            ICON_LINE=""
          fi

          # Copy resources
          if [ -d "contrib/resources" ]; then
            cp -R contrib/resources/* "$APP/Contents/Resources/" 2>/dev/null || true
          fi

          # Create Info.plist with icon reference
          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$APP/Contents/Info.plist"
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "$APP/Contents/Info.plist"
          echo '<plist version="1.0">' >> "$APP/Contents/Info.plist"
          echo '<dict>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundleExecutable</key>' >> "$APP/Contents/Info.plist"
          echo '  <string>dosbox</string>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundleIdentifier</key>' >> "$APP/Contents/Info.plist"
          echo '  <string>com.basebox.app</string>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundleName</key>' >> "$APP/Contents/Info.plist"
          echo '  <string>BaseBox</string>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundlePackageType</key>' >> "$APP/Contents/Info.plist"
          echo '  <string>APPL</string>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundleShortVersionString</key>' >> "$APP/Contents/Info.plist"
          echo "  <string>${{ env.VERSION }}</string>" >> "$APP/Contents/Info.plist"
          echo '  <key>NSHighResolutionCapable</key>' >> "$APP/Contents/Info.plist"
          echo '  <true/>' >> "$APP/Contents/Info.plist"
          if [ -n "$ICON_LINE" ]; then
            echo -e "$ICON_LINE" >> "$APP/Contents/Info.plist"
          fi
          echo '</dict>' >> "$APP/Contents/Info.plist"
          echo '</plist>' >> "$APP/Contents/Info.plist"

      - name: Force link glib for bundler
        run: |
          brew link --overwrite glib gettext
          # Verify the files actually exist where dylibbundler wants them
          ls -l /usr/local/opt/glib/lib/libglib-2.0.0.dylib || true
          ls -l /usr/local/opt/gettext/lib/libintl.dylib || true

      - name: Bundle dynamic dependencies
        timeout-minutes: 10
        run: |
          set -x
          
          # Create Frameworks directory
          mkdir -p "BaseBox.app/Contents/Frameworks/"
          
          # Run dylibbundler - without 'yes quit' which causes it to abort
          # Add all possible Homebrew library paths for both archs
          dylibbundler -cd -b \
            -x "BaseBox.app/Contents/MacOS/dosbox" \
            -d "BaseBox.app/Contents/Frameworks/" \
            -p @executable_path/../Frameworks/ \
            -s /usr/local/lib \
            -s /usr/local/opt/glib/lib \
            -s /usr/local/opt/gettext/lib \
            -s /usr/local/opt/libpng/lib \
            -s /usr/local/opt/sdl2/lib \
            -s /usr/local/opt/opusfile/lib \
            -s /usr/local/opt/speexdsp/lib \
            -s /opt/homebrew/lib \
            -s /opt/homebrew/opt/glib/lib \
            -s /opt/homebrew/opt/gettext/lib \
            -s /opt/homebrew/opt/libpng/lib \
            -s /opt/homebrew/opt/sdl2/lib \
            -s /opt/homebrew/opt/opusfile/lib \
            -s /opt/homebrew/opt/speexdsp/lib || echo "dylibbundler failed, will do manual bundling..."
          
          # Show what was bundled
          echo "Libraries bundled by dylibbundler:"
          ls -la "BaseBox.app/Contents/Frameworks/" || true
          
          # If Frameworks is empty, do manual bundling
          if [ -z "$(ls -A "BaseBox.app/Contents/Frameworks/" 2>/dev/null)" ]; then
            echo "Frameworks empty, doing manual library bundling..."
            
            # Get list of libraries with absolute paths from the binary
            otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -E "/opt/homebrew|/usr/local" | awk '{print $1}' | while read libpath; do
              if [ -f "$libpath" ]; then
                echo "Copying $libpath to Frameworks..."
                cp "$libpath" "BaseBox.app/Contents/Frameworks/"
                libname=$(basename "$libpath")
                echo "Changing reference from $libpath to @executable_path/../Frameworks/$libname"
                install_name_tool -change "$libpath" "@executable_path/../Frameworks/$libname" "BaseBox.app/Contents/MacOS/dosbox"
              else
                echo "WARNING: Library not found: $libpath"
              fi
            done
          fi
          
          echo "Final Frameworks contents:"
          ls -la "BaseBox.app/Contents/Frameworks/"

      - name: Verify and fix library paths
        run: |
          echo "Checking library references in dosbox:"
          otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -v "/usr/lib" | grep -v "/System" || echo "Only system libraries referenced"
          
          # Check for remaining absolute paths and fix them
          otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -E "/opt/homebrew|/usr/local" | while read line; do
            old_path=$(echo "$line" | awk '{print $1}')
            libname=$(basename "$old_path")
            # Check if the library is in our Frameworks
            if [ -f "BaseBox.app/Contents/Frameworks/$libname" ]; then
              echo "Fixing: $old_path -> @executable_path/../Frameworks/$libname"
              install_name_tool -change "$old_path" "@executable_path/../Frameworks/$libname" "BaseBox.app/Contents/MacOS/dosbox"
            fi
          done
          
          echo "Final verification - library references:"
          otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -v "/usr/lib" | grep -v "/System" || echo "All non-system libraries properly referenced"

      - name: Ad-hoc codesign
        run: codesign -s "-" --deep --force "BaseBox.app"

      - name: Verify app bundle
        run: |
          otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -v "/usr/lib" | grep -v "/System"
          ls -la "BaseBox.app/Contents/Frameworks/"

      - name: Create DMG
        run: |
          DMG_NAME="BaseBox_Universal_${{ env.VERSION_HASH }}.dmg"
          mkdir dmg-temp
          cp -R "BaseBox.app" dmg-temp/
          ln -s /Applications dmg-temp/Applications
          hdiutil create \
            -volname "BaseBox" \
            -srcfolder dmg-temp \
            -ov \
            -format UDZO "$DMG_NAME"
          rm -rf dmg-temp
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS-Universal-DMG
          path: ${{ env.DMG_NAME }}

      - name: Release DMG (on tag push)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.DMG_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
