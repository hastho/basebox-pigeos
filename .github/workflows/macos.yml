name: macOS builds
permissions:
  contents: write
  pull-requests: read
  actions: read

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths-ignore:
      - ".clang-format"
      - "*.md"
      - "docs/**"
      - "licenses/**"
  pull_request:
    paths-ignore:
      - ".clang-format"
      - "*.md"
      - "docs/**"
      - "licenses/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_macos:
    name: Build (${{ matrix.conf.arch }})
    runs-on: ${{ matrix.conf.host }}
    timeout-minutes: 90
    strategy:
      matrix:
        conf:
          - host: macos-15-intel
            arch: x86_64
            max_warnings: 0
          - host: macos-15
            arch: arm64
            max_warnings: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install dependencies
        run: |
          brew install python@3.14 || true
          brew link --overwrite python@3.14
          brew install meson ninja glib gettext sdl2 libpng opusfile speexdsp

      - name: Build with Meson
        run: |
          set -xo pipefail
          BUILD_DIR="build-${{ matrix.conf.arch }}"
          
          # Set rpath so dylibbundler can rewrite @rpath references
          # Use cpp_link_args to ensure Meson passes it to linker
          meson setup "$BUILD_DIR" \
            -Dbuildtype=release \
            -Dstrip=true \
            -Dcpp_link_args="-Wl,-rpath,@executable_path/../Frameworks"
          
          meson compile -C "$BUILD_DIR"

      - name: Upload per-arch binary
        uses: actions/upload-artifact@v7
        with:
          name: dosbox-${{ matrix.conf.arch }}
          path: build-${{ matrix.conf.arch }}/dosbox
          overwrite: true

  publish_universal:
    name: Publish Universal Build
    needs: build_macos
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Set version variables
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="nightly-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_HASH=${VERSION}-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Download per-arch binaries
        uses: actions/download-artifact@v8

      - name: Install brew dependencies
        run: |
          brew install dylibbundler
          brew install python@3.14 || true
          brew link --overwrite python@3.14
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install --overwrite librsvg

      - name: Create universal binary
        run: |
          lipo -create dosbox-x86_64/dosbox dosbox-arm64/dosbox \
            -output dosbox-universal
          chmod +x dosbox-universal
          lipo -info dosbox-universal

      - name: Build valid .app bundle
        run: |
          APP="BaseBox.app"
          BINARY="dosbox"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks" "$APP/Contents/Resources"
          cp dosbox-universal "$APP/Contents/MacOS/$BINARY"

          # Copy icon if available
          if [ -f "contrib/icons/macos/dosbox-staging.icns" ]; then
            cp "contrib/icons/macos/dosbox-staging.icns" "$APP/Contents/Resources/AppIcon.icns"
            ICON_LINE="  <key>CFBundleIconFile</key>\n  <string>AppIcon</string>"
          else
            ICON_LINE=""
          fi

          # Copy resources
          if [ -d "contrib/resources" ]; then
            cp -R contrib/resources/* "$APP/Contents/Resources/" 2>/dev/null || true
          fi

          # Create Info.plist with icon reference
          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$APP/Contents/Info.plist"
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "$APP/Contents/Info.plist"
          echo '<plist version="1.0">' >> "$APP/Contents/Info.plist"
          echo '<dict>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundleExecutable</key>' >> "$APP/Contents/Info.plist"
          echo '  <string>dosbox</string>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundleIdentifier</key>' >> "$APP/Contents/Info.plist"
          echo '  <string>com.basebox.app</string>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundleName</key>' >> "$APP/Contents/Info.plist"
          echo '  <string>BaseBox</string>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundlePackageType</key>' >> "$APP/Contents/Info.plist"
          echo '  <string>APPL</string>' >> "$APP/Contents/Info.plist"
          echo '  <key>CFBundleShortVersionString</key>' >> "$APP/Contents/Info.plist"
          echo "  <string>${{ env.VERSION }}</string>" >> "$APP/Contents/Info.plist"
          echo '  <key>NSHighResolutionCapable</key>' >> "$APP/Contents/Info.plist"
          echo '  <true/>' >> "$APP/Contents/Info.plist"
          if [ -n "$ICON_LINE" ]; then
            echo -e "$ICON_LINE" >> "$APP/Contents/Info.plist"
          fi
          echo '</dict>' >> "$APP/Contents/Info.plist"
          echo '</plist>' >> "$APP/Contents/Info.plist"

      - name: Force link glib for bundler
        run: |
          brew link --overwrite glib gettext
          # Verify the files actually exist where dylibbundler wants them
          ls -l /usr/local/opt/glib/lib/libglib-2.0.0.dylib || true
          ls -l /usr/local/opt/gettext/lib/libintl.dylib || true

      - name: Bundle and fix library paths
        timeout-minutes: 10
        run: |
          set -x
          
          # Create Frameworks directory
          mkdir -p "BaseBox.app/Contents/Frameworks/"
          
          # Library map: "library_basename:homebrew_path_pattern"
          # We need to handle both x86_64 (/usr/local) and arm64 (/opt/homebrew) paths
          LIBS=(
            "libglib-2.0.0.dylib:glib"
            "libintl.8.dylib:gettext"
            "libpng16.16.dylib:libpng"
            "libSDL2-2.0.0.dylib:sdl2"
            "libopusfile.0.dylib:opusfile"
            "libspeexdsp.1.dylib:speexdsp"
          )
          
          echo "=== Bundling libraries ==="
          for entry in "${LIBS[@]}"; do
            libname="${entry%%:*}"
            pkg="${entry##*:}"
            
            # Try to find the library on the current system
            found=""
            for prefix in /opt/homebrew /usr/local; do
              path="$prefix/opt/$pkg/lib/$libname"
              if [ -f "$path" ]; then
                echo "Found: $path"
                cp "$path" "BaseBox.app/Contents/Frameworks/$libname"
                found=1
                break
              fi
            done
            
            if [ -z "$found" ]; then
              echo "WARNING: $libname not found in Homebrew"
            fi
          done
          
          echo "=== Frameworks contents ==="
          ls -la "BaseBox.app/Contents/Frameworks/"
          
          echo "=== Fixing library paths in universal binary ==="
          # Fix paths for both architectures in the universal binary
          # x86_64 was built with /usr/local paths, arm64 with /opt/homebrew paths
          for entry in "${LIBS[@]}"; do
            libname="${entry%%:*}"
            pkg="${entry##*:}"
            
            # Fix x86_64 path (built on macos-15-intel)
            old_path_x86="/usr/local/opt/$pkg/lib/$libname"
            if otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -q "$old_path_x86"; then
              echo "Fixing x86_64 path: $old_path_x86 -> @executable_path/../Frameworks/$libname"
              install_name_tool -change "$old_path_x86" "@executable_path/../Frameworks/$libname" "BaseBox.app/Contents/MacOS/dosbox"
            fi
            
            # Fix arm64 path (built on macos-15)
            old_path_arm="/opt/homebrew/opt/$pkg/lib/$libname"
            if otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -q "$old_path_arm"; then
              echo "Fixing arm64 path: $old_path_arm -> @executable_path/../Frameworks/$libname"
              install_name_tool -change "$old_path_arm" "@executable_path/../Frameworks/$libname" "BaseBox.app/Contents/MacOS/dosbox"
            fi
          done
          
          echo "=== Final verification ==="
          otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -v "/usr/lib" | grep -v "/System" || echo "All non-system libraries properly referenced"
 
      - name: Smoke test application launch
        run: |
          # Test that the bundled app can actually launch
          # SDL_VIRTUALDRIVER=dummy allows headless execution
          SDL_VIRTUALDRIVER=dummy ./BaseBox.app/Contents/MacOS/dosbox --version 2>&1
          echo "App launched successfully (exit code: $?)"
          else
            echo "FAILURE: App failed to launch (exit code: $exit_code)"
            echo "=== Library diagnostics ==="
            otool -L "BaseBox.app/Contents/MacOS/dosbox"
            echo "=== Frameworks contents ==="
            ls -la "BaseBox.app/Contents/Frameworks/"
            exit 1
          fi
 
      - name: Ad-hoc codesign
        run: codesign -s "-" --deep --force "BaseBox.app"

      - name: Verify app bundle
        run: |
          otool -L "BaseBox.app/Contents/MacOS/dosbox" | grep -v "/usr/lib" | grep -v "/System"
          ls -la "BaseBox.app/Contents/Frameworks/"

      - name: Create DMG
        run: |
          DMG_NAME="BaseBox_Universal_${{ env.VERSION_HASH }}.dmg"
          mkdir dmg-temp
          cp -R "BaseBox.app" dmg-temp/
          ln -s /Applications dmg-temp/Applications
          hdiutil create \
            -volname "BaseBox" \
            -srcfolder dmg-temp \
            -ov \
            -format UDZO "$DMG_NAME"
          rm -rf dmg-temp
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS-Universal-DMG
          path: ${{ env.DMG_NAME }}

      - name: Release DMG (on tag push)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.DMG_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
