name: macOS builds

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_macos_universal:
    name: macOS Universal Release
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew update
          brew install meson ninja sdl2 libpng opusfile speexdsp ccache

      - name: Restore subprojects cache
        uses: actions/cache@v4
        with:
          path: subprojects.tar
          key: subprojects-${{ hashFiles('subprojects/*.wrap') }}-1

      - name: Extract or Fetch subprojects
        run: |
          if [ -f subprojects.tar ]; then
            tar -xf subprojects.tar
          else
            chmod +x scripts/fetch-and-tar-subprojects.sh
            ./scripts/fetch-and-tar-subprojects.sh
            tar -xf subprojects.tar
          fi

      - name: Build x86_64 (Intel)
        run: |
          cat <<EOF > macos_x86_64.ini
          [binaries]
          c = 'cc'
          cpp = 'c++'
          objc = 'cc'
          objcpp = 'c++'
          ar = 'ar'
          strip = 'strip'

          [built-in options]
          c_args = ['-arch', 'x86_64', '-march=x86-64-v2', '-mmacosx-version-min=11.0']
          cpp_args = ['-arch', 'x86_64', '-march=x86-64-v2', '-mmacosx-version-min=11.0']
          c_link_args = ['-arch', 'x86_64']
          cpp_link_args = ['-arch', 'x86_64']

          [properties]
          needs_exe_wrapper = true
          skip_sanity_check = true

          [host_machine]
          system = 'darwin'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF
          meson setup build_x86 \
            --cross-file macos_x86_64.ini \
            --wrap-mode=forcefallback \
            -Dbuildtype=release \
            -Dstrip=true \
            -Dautovec_info=false \
            -Dspeexdsp:neon=disabled || (cat build_x86/meson-logs/meson-log.txt && exit 1)
          meson compile -C build_x86

      - name: Build arm64 (Apple Silicon)
        run: |
          meson setup build_arm \
            -Dbuildtype=release \
            -Dstrip=true
          meson compile -C build_arm

      - name: Create Universal App Bundle
        run: |
          BINARY_NAME="dosbox" 
          APP_NAME="BaseBox"
          mkdir -p "${APP_NAME}.app/Contents/MacOS"
          
          lipo -create \
            build_x86/${BINARY_NAME} \
            build_arm/${BINARY_NAME} \
            -output "${APP_NAME}.app/Contents/MacOS/${APP_NAME}"
          
          file "${APP_NAME}.app/Contents/MacOS/${APP_NAME}"

      - name: Create DMG
        run: |
          hdiutil create -volname "BaseBox" \
                         -srcfolder "BaseBox.app" \
                         -ov -format UDZO \
                         BaseBox_Universal.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Universal-DMG
          path: "*.dmg"

