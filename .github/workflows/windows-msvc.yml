name: Windows MSVC builds

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_ROOT: C:\vcpkg
  VCPKG_BINARY_SOURCES: 'clear;nuget,GitHub,readwrite'

jobs:
  build_windows_vs_release:
    name: ${{ matrix.conf.name }}
    runs-on: windows-2022
    strategy:
      matrix:
        conf:
          - name: Release build (64-bit)
            arch: x64
            vs-release-dirname: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false

      - name:  Setup vcpkg and NuGet
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ env.VCPKG_ROOT }}"
          git checkout master -f
          git pull
          ./bootstrap-vcpkg.sh -disableMetrics
          nuget=$(./vcpkg.exe fetch nuget | tail -n 1)
          owner="${GITHUB_REPOSITORY%/*}"
          source_url="https://nuget.pkg.github.com/$owner/index.json"
          "$nuget" sources add \
            -source "$source_url" \
            -storepasswordincleartext \
            -name "GitHub" \
            -username "$owner" \
            -password "${{ secrets.GITHUB_TOKEN }}"
          "$nuget" setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -source "$source_url"

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
            vs-prerelease: true
            msbuild-architecture: ${{ matrix.conf.arch }}

      - name:  Integrate packages
        shell: pwsh
        run: |
          ${{ env.VCPKG_ROOT }}\vcpkg.exe integrate install
          if (-not $?) { throw "vcpkg failed to integrate packages" }

      - name:  Log environment
        shell: pwsh
        run:   .\scripts\log-env.ps1

      - name:  Set version
        id:    set_dosbox_vers
        shell: bash
        run: |
          set -x
          git fetch --prune --unshallow
          git fetch --all --tags --force
          export VERSION=$(git describe --abbrev=0)
          # inject version based on vcs
          sed -i "s|DOSBOX_DETAILED_VERSION \"git\"|DOSBOX_DETAILED_VERSION \"$VERSION\"|" src/platform/visualc/config.h
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "dosbox_vers=${VERSION}" >> $GITHUB_OUTPUT

      - name:  Build release
        shell: pwsh
        run: |
          cd vs
          MSBuild -m dosbox.sln -t:dosbox:Rebuild -p:Configuration=Release -p:Platform=${{ matrix.conf.arch }}

      - name:  Set packaging names
        id:    set_pkg_dir
        shell: bash
        run: |
          echo "pkg_dir=dosbox-staging-windows-${{ matrix.conf.arch }}-${{ env.VERSION }}" >> $GITHUB_OUTPUT

      - name: Package
        shell: bash
        run: |
          readonly VC_REDIST_BASE="C:/Program Files (x86)/Microsoft Visual Studio/2022/BuildTools/VC/Redist/MSVC"
          # Find the CRT directory containing DLLs (e.g., x64/Microsoft.VC143.CRT/)
          VC_REDIST_DIR=$(find "$VC_REDIST_BASE" -type d -name "Microsoft.VC143.CRT" 2>/dev/null | head -1)
          if [ -z "$VC_REDIST_DIR" ]; then
            echo "Error: Could not find MSVC CRT directory"
            exit 1
          fi
          echo "Found VC_REDIST_DIR: $VC_REDIST_DIR"
          export VC_REDIST_DIR
          ./scripts/create-package.sh \
            -p msvc \
            vs/${{ matrix.conf.vs-release-dirname }}/Release \
            "${{ steps.set_pkg_dir.outputs.pkg_dir }}"

      - name: Create ZIP archive
        shell: bash
        run: |
          cd "${{ steps.set_pkg_dir.outputs.pkg_dir }}"
          powershell -Command "Compress-Archive -Path * -DestinationPath ../dosbox-staging-windows-${{ matrix.conf.arch }}.zip -Force"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: dosbox-staging-windows-${{ matrix.conf.arch }}
          path: dosbox-staging-windows-${{ matrix.conf.arch }}.zip
          overwrite: true

  tag_build:
    name: Tag Build
    needs: [build_windows_vs_release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag_name
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH_NAME" == "main" ]]; then
            TAG_NAME="CI-latest"
          else
            TAG_NAME="CI-latest-${BRANCH_NAME}"
          fi
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Tagging HEAD with: ${TAG_NAME}"

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -f ${{ steps.tag_name.outputs.tag_name }}
          git push origin ${{ steps.tag_name.outputs.tag_name }} --force
